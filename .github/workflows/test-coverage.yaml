# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples

name: test-coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install INLA (optional)
        shell: Rscript {0}
        run: |
          tryCatch(
            install.packages(
              "INLA",
              repos = c(
                INLA = "https://inla.r-inla-download.org/R/testing",
                CRAN = "https://cloud.r-project.org"
              )
            ),
            error = function(e) message("INLA install failed (optional): ", e$message)
          )

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr

      - name: Install PROGSF90 binaries
        run: |
          mkdir -p inst/bin
          curl -fsSL "https://famuvie.github.io/breedR/bin/linux/64bit/pf90.tar.gz" -o pf90.tar.gz
          tar xzf pf90.tar.gz -C inst/bin
          chmod +x inst/bin/remlf90 inst/bin/airemlf90
          ls -la inst/bin/
          rm -f pf90.tar.gz

      - name: Generate test coverage
        shell: Rscript {0}
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          print(cov)
          covr::to_cobertura(cov)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: cobertura.xml
